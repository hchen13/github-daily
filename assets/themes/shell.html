<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>{{CSS}}</style>
</head>
<body>
  <article class="publication">
    <header class="masthead">
      <div class="masthead-left">
        <img class="masthead-logo" src="{{LOGO_URI}}" alt="辛哥">
        <div class="masthead-wordmark">
          <div class="masthead-kicker">GITHUB DAILY</div>
          <div class="masthead-title">辛哥的开源风向</div>
        </div>
      </div>
      <div class="masthead-right">
        <div class="masthead-edition">VOL. MMXXVI</div>
        <div class="masthead-date">{{DATE}}</div>
      </div>
    </header>
{{BODY}}
  </article>
  <footer class="publication-footer">
    GitHub Daily · 辛哥的开源风向 · <a href="https://github.com/hchen13/github-daily">github.com/hchen13/github-daily</a>
  </footer>
  <script>{{CHART_SCRIPT}}</script>
</body>
</html>
